<form>
    <label for="name">Full Name:</label>
    <input type="text" id="name" name="name" placeholder="enter your name"required>

    <label for="email">Email:</label>
    <input type="email" id="email" name="email" required>

    <label for="pw">Password:</label>
    <input type="password" id="pw" name="pw">

    <label for="age">Age:</label>
    <input type="number" id="age" name="age" min="0" max="120">

    <p>Favourite colour:</p>
    <input type="radio" id="red" name="colour" value="red">
    <label for="red">Red</label>
    <input type="radio" id="blue" name="colour" value="blue">
    <label for="blue">Blue</label>

    <p>Interests:</p>
    <input type="checkbox" id="sports" name="interest" value="sports">
    <label for="sports">Sports</label>
    <input type="checkbox" id="music" name="interest" value="music">
    <label for="music">Music</label>

    <label for="country">country:</label>
    <select name="country" id="country">
        <option value="in">INDIA</option>
        <option value="us">USA</option>
        <option value="uk">UK</option>
    </select>

    <label for="msg">message:</label>
    <textarea name="msg" id="msg" rows="4"></textarea>

    <button type="submit" style="background-color: red; color: white; padding: 8px 20px;">Submit</button>
    &nbsp;
    <button type="reset" style="background-color: blue; color: white; padding: 8px 20px;">Reset</button>

</form>
